<!doctype html>

<html>
  <head>
    <meta charset="utf-8">
    <title>WebGPU Life</title>
  </head>
  <body>
    <canvas width="512" height="512"></canvas>
    <script type="module">
    const canvas = document.querySelector("canvas");

    const GRID_SIZE = 32;
    const UPDATE_INTERVAL = 200; //Milliseconds between updates
    const WORKGROUP_SIZE = 8; //Size of the workgroup for the compute shader
    let step = 0; //Current step in the simulation

    // Initialize WebGPU
    //Request a GPUAdapter and GPUDevice
    if (!navigator.gpu)
    {
        throw new Error("WebGPU not supported on this browser.");
    }

    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter)
    {
        throw new Error("No appropriate GPUAdapter found.");
    }

    const device = await adapter.requestDevice();

    //Configure the canvas context for WebGPU rendering
    const context = canvas.getContext("webgpu");

    const canvasFormat = navigator.gpu.getPreferredCanvasFormat();

    context.configure({
        device: device,
        format: canvasFormat,
        alphaMode: "opaque",
    });

    //Draw geometry
    //Define vertices
    const vertices = new Float32Array
    ([
    //   X,    Y,
      -0.8, -0.8,
       0.8, -0.8,
       0.8,  0.8,

      -0.8, -0.8,
       0.8,  0.8,
      -0.8,  0.8,
    ]);

    //Create a GPUBuffer to hold the vertex data
    const vertexBuffer = device.createBuffer
    ({
      label: "Cell vertices",
      size: vertices.byteLength,
      usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
    });

    //Write the vertex data to the GPUBuffer
    device.queue.writeBuffer(vertexBuffer, 0, vertices);

    //Define the vertex layout
    const vertexBufferLayout = 
    {
      arrayStride: 2 * 4, //2 floats per vertex, 4 bytes per float
      attributes:
      [{
        format: "float32x2",
        offset: 0,
        shaderLocation: 0, //Position attribute in the vertex shader
      }],
    };

    //Create a uniform buffer for the grid size
    const uniformArray = new Float32Array([GRID_SIZE, GRID_SIZE]);
    const uniformBuffer = device.createBuffer
    ({
      label: "Grid uniforms",
      size: uniformArray.byteLength,
      usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
    });

    device.queue.writeBuffer(uniformBuffer, 0, uniformArray);

    //Create two storage buffers for the cell state
    const cellStateArray = new Uint32Array(GRID_SIZE * GRID_SIZE);
    const cellStateBuffer = [device.createBuffer
    ({
      label: "Cell state A",
      size: cellStateArray.byteLength,
      usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
    }),
    device.createBuffer({
      label: "Cell state B",
      size: cellStateArray.byteLength,
      usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
    })];

    //Mark random cells as alive (1) and the rest as dead (0) in the first grid
    for(let i = 0 ; i < cellStateArray.length ; ++i)
    {
      cellStateArray[i] = Math.random() > 0.6 ? 1 : 0;
    }
    device.queue.writeBuffer(cellStateBuffer[0], 0, cellStateArray);
  
    //Mark every other cell as alive (1) and the rest as dead (0) in the second grid
    for(let i = 0 ; i < cellStateArray.length ; i ++)
    {
      cellStateArray[i] = i % 2;
    }
    device.queue.writeBuffer(cellStateBuffer[1], 0, cellStateArray);

    //Vertex and fragment shader code for rendering the cells
    const cellShaderModule = device.createShaderModule
    ({
      label: "Cell shader",
      code: `
        struct VertexInput
        {
          @location(0) pos: vec2f,
          @builtin(instance_index) instance: u32,
        };

        struct VertexOutput
        {
          @builtin(position) pos: vec4f,
          @location(0) cell: vec2f,
        };

        @group(0) @binding(0) var<uniform> grid: vec2f;
        @group(0) @binding(1) var<storage> cellState: array<u32>;
        
        @vertex
        fn vertexMain(input: VertexInput) -> VertexOutput
        {
          let i = f32(input.instance); //Convert instance index to float
          let cell = vec2f(i % grid.x, floor(i / grid.x)); //Cell position in the grid
          let state = f32(cellState[input.instance]); //Cell state (0 or 1)
          let cellOffset = (cell / grid) * 2; //Offset to position the cell in the grid
          let gridPos = (((input.pos * state) + 1) / grid) - 1 + cellOffset; //Position the cell in the grid

          var output: VertexOutput;
          output.pos = vec4f(gridPos, 0, 1); //(X, Y, Z, W) position in clip space
          output.cell = cell; //Pass the cell position to the fragment shader
          return output;
        }

        @fragment
        fn fragmentMain(input: VertexOutput) -> @location(0) vec4f
        {
          let c = input.cell / grid; //Cell position normalized to [0, 1]
          return vec4f(c, 1 - c.x, 1); //Color based on cell position
        }
      `
    });

    //Simulation compute shader code for updating the cell state
    const simulationShaderModule = device.createShaderModule
    ({
      label: "Game of Life simulation shader",
      code: `
        @group(0) @binding(0) var<uniform> grid: vec2f;
        @group(0) @binding(1) var<storage> cellStateIn: array<u32>;
        @group(0) @binding(2) var<storage, read_write> cellStateOut: array<u32>;

        fn cellIndex(cell: vec2u) -> u32
        {
          return (cell.y % u32(grid.y)) * u32(grid.x) + (cell.x % u32(grid.x));
        }

        fn cellActive(x: u32, y: u32) -> u32
        {
          return cellStateIn[cellIndex(vec2(x, y))];
        }
        
        @compute
        @workgroup_size(${WORKGROUP_SIZE}, ${WORKGROUP_SIZE})
        fn computeMain(@builtin(global_invocation_id) cell: vec3u)
        {
          let activeNeighnors = cellActive(cell.x, cell.y - 1) +
                                cellActive(cell.x + 1, cell.y - 1) +
                                cellActive(cell.x - 1, cell.y) +
                                cellActive(cell.x + 1, cell.y) +
                                cellActive(cell.x - 1, cell.y + 1) +
                                cellActive(cell.x, cell.y + 1) +
                                cellActive(cell.x + 1, cell.y + 1) +
                                cellActive(cell.x - 1, cell.y - 1);
          
          let i = cellIndex(cell.xy);

          //Apply the rules of Conway's Game of Life
          switch activeNeighnors
          {
            case 2: { cellStateOut[i] = cellStateIn[i]; } //Cell stays the same
            case 3: { cellStateOut[i] = 1; } //Cell becomes alive
            default: { cellStateOut[i] = 0; } //Cell dies
          }
        }
      `
    });
  
    //Create bind group layouts for the compute shader
    const bindGroupLayout = device.createBindGroupLayout
    ({
      label: "Cell Bind Group Layout",
      entries:
      [{
        binding: 0,
        visibility: GPUShaderStage.COMPUTE | GPUShaderStage.VERTEX | GPUShaderStage.FRAGMENT,
        buffer: {} //Uniform buffer for grid size
      },
      {
        binding: 1,
        visibility: GPUShaderStage.COMPUTE | GPUShaderStage.VERTEX | GPUShaderStage.FRAGMENT,
        buffer: { type: "read-only-storage" } //Storage buffer for input cell state
      },
      {
        binding: 2,
        visibility: GPUShaderStage.COMPUTE,
        buffer: { type: "storage" } //Storage buffer for output cell state
      }]
    });

    //Create a bind group for the uniform buffer
    const bindGroups = [device.createBindGroup
    ({
      label: "Cell renderer bind group A",
      layout: bindGroupLayout,
      entries:
      [{
        binding: 0,
        resource: { buffer: uniformBuffer }
      },
      {
        binding: 1,
        resource: { buffer: cellStateBuffer[0] }
      },
      {
        binding: 2,
        resource: { buffer: cellStateBuffer[1] }
      }],
    }),
    device.createBindGroup({
      label: "Cell renderer bind group B",
      layout: bindGroupLayout,
      entries:
      [{
        binding: 0,
        resource: { buffer: uniformBuffer }
      },
      {
        binding: 1,
        resource: { buffer: cellStateBuffer[1] }
      },
      {
        binding: 2,
        resource: { buffer: cellStateBuffer[0] }
      }],
    })];

    //Create pipeline layout for the compute shader
    const pipelineLayout = device.createPipelineLayout
    ({
      label: "Cell Pipeline Layout",
      bindGroupLayouts: [bindGroupLayout],
    });

    //Create render pipeline
    const cellPipeline = device.createRenderPipeline
    ({
      label: "Cell pipeline",
      layout: pipelineLayout,
      vertex:
      {
        module: cellShaderModule,
        entryPoint: "vertexMain",
        buffers: [vertexBufferLayout]
      },
      fragment:
      {
        module: cellShaderModule,
        entyPoint: "fragmentMain",
        targets:
        [{
          format: canvasFormat
        }]
      }
    });

    //Create compute pipeline
    const simulationPipeline = device.createComputePipeline
    ({
      label: "Simulation Pipeline",
      layout: pipelineLayout,
      compute:
      {
        module: simulationShaderModule,
        entryPoint: "computeMain",
      }
    })

    //Update the grid and render it to the canvas
    function updateGrid()
    {
      //Create a command encoder and render pass
      const commandEncoder = device.createCommandEncoder();

      //Create a compute pass to update the cell state
      const computePass = commandEncoder.beginComputePass();

      computePass.setPipeline(simulationPipeline);
      computePass.setBindGroup(0, bindGroups[step % 2]); //Alternate between the two bind groups

      const workgroupCount = Math.ceil(GRID_SIZE / WORKGROUP_SIZE); //Calculate the number of workgroups needed
      computePass.dispatchWorkgroups(workgroupCount, workgroupCount); //Dispatch the compute shader

      computePass.end();

      step++;
      
      //Clear the canvas to a blue color
      const pass = commandEncoder.beginRenderPass
      ({
          colorAttachments:
          [{
              view: context.getCurrentTexture().createView(),
              loadOp: "clear",
              clearValue: [0.5, 0, 0, 1],
              storeOp: "store",
          }],
      })

      //Set the pipeline and draw the geometry
      pass.setPipeline(cellPipeline);
      pass.setVertexBuffer(0, vertexBuffer);
      //Bind the bind group
      pass.setBindGroup(0, bindGroups[step % 2]); //Alternate between the two bind groups
      //Draw
      pass.draw(vertices.length / 2, GRID_SIZE * GRID_SIZE, 0, 0); //6 vertices, 32*32 instances, first vertex, first instance

      //End the render pass and submit the command buffer
      pass.end();

      const commandBuffer = commandEncoder.finish();

      device.queue.submit([commandBuffer]);
    }

    setInterval(updateGrid, UPDATE_INTERVAL); //Call updateGrid every UPDATE_INTERVAL milliseconds
    </script>
  </body>
</html>
